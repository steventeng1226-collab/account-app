<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="流水帳">
<title>流水帳統計中心</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #080c14;
  --bg2: #0f172a;
  --bg3: #1e293b;
  --border: #1e3a8a30;
  --border2: #374151;
  --accent: #3b82f6;
  --accent2: #1d4ed8;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --card-bg: #0f172a;
  --tab-h: 52px;
  --header-h: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  overflow: hidden;
}

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: linear-gradient(135deg, #0f172a, #1a2540);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  z-index: 300;
}
#header .logo { display: flex; align-items: center; gap: 8px; }
#header .logo span { font-size: 20px; }
#header h1 { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: .3px; }
#header .ver {
  font-size: 9px; color: #60a5fa; background: #1e3a5f;
  border: 1px solid #2563eb44; border-radius: 20px;
  padding: 2px 8px; font-weight: 600;
}


/* ── Tabs ── */
#tabs {
  position: fixed;
  top: var(--header-h); left: 0; right: 0;
  height: var(--tab-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 6px 8px; gap: 4px;
  z-index: 99; overflow-x: auto;
}
#tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1; min-width: 64px;
  background: none; border: none;
  color: var(--text3); font-size: 11px; font-weight: 500;
  padding: 6px 4px; border-radius: 7px;
  cursor: pointer; white-space: nowrap;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all .2s;
}
.tab-btn.active {
  background: var(--bg3); color: var(--text);
  font-weight: 700;
  border-bottom: 2px solid var(--accent);
}

/* ── Content ── */
#content {
  position: fixed;
  top: calc(var(--header-h) + var(--tab-h));
  left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.page { display: none; padding: 12px 10px 80px; }
.page.active { display: block; }

/* ── Cards ── */
.stat-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 10px;
}
.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}
.stat-card.wide { grid-column: span 2; }
.stat-lbl { font-size: 9px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.stat-val { font-size: 18px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
.stat-val.sm { font-size: 14px; }

/* ── Banner ── */
.m-banner {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px;
  margin-bottom: 10px;
  font-size: 12px; color: #60a5fa; font-weight: 700;
}

/* ── Est bar ── */
.est-bar {
  background: #0f2444; border: 1px solid #1e3a8a;
  border-radius: 6px; padding: 6px 10px;
  font-size: 11px; color: #93c5fd;
  margin-bottom: 10px;
}

/* ── Chart container ── */
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.chart-box {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px;
  position: relative; overflow: hidden;
  height: 180px;
}
.chart-title { font-size: 10px; color: var(--text2); font-weight: 600; margin-bottom: 6px; text-align: center; }
canvas { width: 100% !important; }

/* ── Table ── */
.rank-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.rank-table th { color: var(--text3); font-size: 9px; text-transform: uppercase; padding: 4px 6px; text-align: left; border-bottom: 1px solid var(--border2); }
.rank-table td { color: var(--text); padding: 5px 6px; border-bottom: 1px solid #1f293730; }
.rank-table tr:last-child td { border-bottom: none; }
.rank-table .num { text-align: right; font-family: 'DM Mono', monospace; }
.rank-table .pct { text-align: right; color: #60a5fa; font-family: 'DM Mono', monospace; }

/* ── List ── */
.list-filter {
  display: flex; gap: 6px; margin-bottom: 10px;
  overflow-x: auto; padding-bottom: 4px;
}
.list-filter::-webkit-scrollbar { display: none; }
.filter-btn {
  flex: 0 0 auto;
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); border-radius: 20px;
  padding: 4px 12px; font-size: 11px; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all .2s;
}
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.list-item { overflow: hidden;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 9px; padding: 10px 12px;
  margin-bottom: 7px;
  display: grid; grid-template-columns: 1fr auto;
  gap: 2px 8px;
}
.list-item .date { font-size: 10px; color: var(--text3); }
.list-item .name { font-size: 13px; font-weight: 600; color: var(--text); }
.list-item .cat { 
  display: inline-block; font-size: 9px; 
  background: var(--bg3); border-radius: 4px;
  padding: 1px 6px; color: var(--text2); margin-top: 2px;
}
.list-item .amt {
  font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace;
  color: var(--text); text-align: right;
}
.list-item .pay { font-size: 10px; color: var(--text3); text-align: right; }
.list-caption { font-size: 10px; color: var(--text3); text-align: center; padding: 8px 0; }

/* ── Form ── */
.form-section { margin-bottom: 14px; }
.form-label { font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; display: block; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

input[type="date"], input[type="number"], input[type="text"], textarea {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 8px;
  color: #ffffff; font-size: 14px;
  padding: 10px 12px; outline: none;
  font-family: 'Noto Sans TC', sans-serif;
  -webkit-appearance: none;
}
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
input::placeholder, textarea::placeholder { color: #64748b !important; }
input[type="number"] { color: #ffffff !important; }
select { color: #ffffff !important; }
input[type="date"]:focus, input[type="number"]:focus,
input[type="text"]:focus, textarea:focus {
  border-color: var(--accent);
}
textarea { resize: none; height: 64px; }

/* ── Pills ── */
.pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); border-radius: 7px;
  padding: 6px 12px; font-size: 12px;
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  transition: all .15s; user-select: none;
}
.pill.selected { background: var(--accent2); border-color: var(--accent); color: #fff; font-weight: 600; }
.pill.unselected-warn { border-color: var(--red); }

/* ── TWD Preview ── */
.twd-preview {
  background: #0f2444; border: 1px solid #1e3a8a;
  border-radius: 8px; padding: 8px 12px;
  font-size: 12px; color: #93c5fd;
  margin-bottom: 12px;
}
.twd-preview strong { color: #f1f5f9; font-size: 18px; font-family: 'DM Mono', monospace; }

/* ── Buttons ── */
.btn-row { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
.btn-primary {
  background: var(--accent); border: none;
  color: #fff; border-radius: 9px;
  padding: 13px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  transition: background .2s; width: 100%;
}
.btn-primary:active { background: var(--accent2); }
.btn-secondary {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); border-radius: 9px;
  padding: 13px; font-size: 13px;
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  width: 100%;
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1e293b; border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 20px;
  font-size: 13px; color: var(--text);
  z-index: 999; opacity: 0; pointer-events: none;
  transition: opacity .3s; white-space: nowrap;
}
#toast.show { opacity: 1; }
#toast.ok { border-color: var(--green); color: var(--green); }
#toast.err { border-color: var(--red); color: var(--red); }

/* ── Loading ── */
.loading { text-align: center; padding: 40px 0; color: var(--text3); }
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Divider ── */
.divider { border: none; border-top: 1px solid var(--border2); margin: 12px 0; }

/* ── Section title ── */
.sec-title { font-size: 13px; font-weight: 700; color: #60a5fa; margin-bottom: 10px; }

/* ── Month selector ── */
.month-select {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); border-radius: 8px;
  padding: 8px 10px; font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  width: 100%; margin-bottom: 10px; outline: none;
}


/* ── Autocomplete ── */
.autocomplete-wrap { position: relative; }
.autocomplete-list {
  position: fixed; left: 12px; right: 12px;
  background: #1e293b; border: 1px solid #3b82f6;
  border-radius: 12px; z-index: 9999;
  max-height: 260px; overflow-y: auto;
  box-shadow: 0 8px 32px #00000080;
}
.autocomplete-item {
  padding: 10px 12px; cursor: pointer;
  border-bottom: 1px solid #1f293740;
  display: flex; justify-content: space-between; align-items: center;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:active { background: #2563eb; }
.autocomplete-item .ac-name { color: #e2e8f0; font-size: 13px; font-weight: 500; }
.autocomplete-item .ac-meta { color: #64748b; font-size: 10px; text-align: right; }
.autocomplete-item .ac-highlight { color: #60a5fa; }


/* ── Edit Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: #00000088; z-index: 500;
  display: flex; align-items: flex-end;
}
.modal-box {
  background: #0f172a; border: 1px solid #1e3a8a;
  border-radius: 16px 16px 0 0;
  width: 100%; padding: 16px 14px 32px;
  max-height: 90vh; overflow-y: auto;
}
.modal-title {
  font-size: 15px; font-weight: 700; color: #e2e8f0;
  margin-bottom: 14px; display: flex; justify-content: space-between;
}
.modal-close {
  background: none; border: none; color: #64748b;
  font-size: 20px; cursor: pointer; padding: 0 4px;
}
.modal-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px;
}
.btn-danger {
  background: #7f1d1d; border: 1px solid #ef4444;
  color: #fca5a5; border-radius: 9px;
  padding: 12px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif; width: 100%;
}

/* ── Empty state ── */
.empty { text-align: center; padding: 40px 0; color: var(--text3); font-size: 13px; }

/* ── 代墊分頁 ── */
.reimburse-header { padding: 16px 16px 0; }
.reimburse-summary { display: flex; gap: 12px; margin-bottom: 14px; }
.rs-card { flex: 1; border-radius: 12px; padding: 14px 12px; text-align: center; }
.rs-card.unpaid { background: linear-gradient(135deg, #7c3aed22, #7c3aed44); border: 1px solid #7c3aed66; }
.rs-card.paid   { background: linear-gradient(135deg, #05966922, #05966944); border: 1px solid #05966966; }
.rs-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
.rs-amt   { font-size: 18px; font-weight: 700; color: #ffffff; }
.rs-count { font-size: 11px; color: #64748b; margin-top: 2px; }
.reimburse-filter { display: flex; gap: 8px; margin-bottom: 12px; }
.rf-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #334155;
  background: transparent; color: #94a3b8; font-size: 13px; cursor: pointer; }
.rf-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; font-weight: 600; }
.reimburse-list { padding: 0 16px 80px; }
.reimburse-item { display: flex; align-items: center; gap: 12px;
  background: #1e293b; border-radius: 12px; padding: 14px 12px; margin-bottom: 10px;
  border: 1px solid #334155; transition: opacity .3s; }
.reimburse-item.is-paid { opacity: 0.55; }
.reimburse-check { position: relative; width: 24px; height: 24px; flex-shrink: 0; cursor: pointer; }
.reimburse-check input { opacity: 0; width: 0; height: 0; position: absolute; }
.checkmark { position: absolute; inset: 0; border-radius: 6px;
  border: 2px solid #475569; background: #0f172a; transition: all .2s; }
.reimburse-check input:checked ~ .checkmark {
  background: #059669; border-color: #059669; }
.checkmark:after { content: '✓'; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); color: #fff; font-size: 13px; font-weight: 700;
  display: none; }
.reimburse-check input:checked ~ .checkmark:after { display: block; }
.reimburse-info { flex: 1; min-width: 0; }
.ri-date { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
.ri-name { font-size: 14px; font-weight: 600; color: #e2e8f0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-paid-name { text-decoration: line-through; color: #64748b; }
.ri-meta { font-size: 11px; color: #94a3b8; margin-top: 3px; }
.reimburse-amt { text-align: right; flex-shrink: 0; }
.ri-orig { font-size: 14px; font-weight: 700; color: #ffffff; }
.ri-twd { font-size: 12px; color: #cbd5e1; margin-top: 1px; }
.rs-cur { font-size: 13px; color: #ffffff; margin-top: 3px; font-weight: 600; }
.ri-paid-badge { font-size: 10px; color: #059669; margin-top: 3px; font-weight: 600; }


/* ── 收據上傳 ── */
.upload-area {
  border: 2px dashed #334155; border-radius: 12px;
  padding: 20px; text-align: center; cursor: pointer;
  background: #0f172a; transition: border-color .2s;
}
.upload-area:active { border-color: #3b82f6; }
.upload-icon { font-size: 28px; margin-bottom: 6px; }
.upload-hint { font-size: 13px; color: #e2e8f0; font-weight: 600; }
.upload-sub  { font-size: 11px; color: #64748b; margin-top: 3px; }
.file-preview-inner { display: flex; align-items: center; gap: 10px;
  background: #1e293b; border-radius: 10px; padding: 10px 12px; margin-top: 8px; }
.preview-name { flex: 1; font-size: 12px; color: #94a3b8;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.remove-file-btn { background: #ef444420; border: 1px solid #ef444450;
  color: #ef4444; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; flex-shrink: 0; }
.progress-bar { height: 6px; background: #1e293b; border-radius: 3px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: #3b82f6; border-radius: 3px;
  width: 0%; transition: width .3s; }
.progress-text { font-size: 11px; color: #64748b; margin-top: 5px; text-align: center; }


/* ── 提交按鈕固定底部 ── */
.sticky-submit {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 10px 16px 20px;
  background: linear-gradient(to top, #0f172a 70%, transparent);
  z-index: 100;
}


/* ── 當月一頁版面 ── */
#page-monthly.active { display: flex; flex-direction: column; height: calc(100vh - 100px); overflow: hidden; padding: 8px 12px 4px; }
.monthly-onepage { display: flex; flex-direction: column; height: 100%; gap: 6px; }

.mo-top { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.month-select-sm { background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
  border-radius: 8px; padding: 5px 10px; font-size: 13px; flex: 1; }
.mo-prog { font-size: 12px; color: #60a5fa; font-weight: 600; white-space: nowrap; }

.mo-cards { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; flex-shrink: 0; }
.mo-card { background: #1e293b; border-radius: 10px; padding: 8px 6px; text-align: center;
  border: 1px solid #334155; }
.mo-card.co { border-color: #92400e; background: #1a1200; }
.mo-card.est { border-color: #1e3a5f; background: #0c1a2e; }
.mo-card-lbl { font-size: 9px; color: #64748b; margin-bottom: 3px; line-height: 1.2; }
.mo-card-val { font-size: 13px; font-weight: 700; color: #f1f5f9; }
.mo-card-val.co { color: #fbbf24; }
.mo-card-val.est { color: #60a5fa; }

.mo-charts { display: flex; gap: 6px; height: 160px; flex-shrink: 0; }
.mo-chart-box { flex: 1; background: #1e293b; border-radius: 10px; padding: 6px;
  border: 1px solid #334155; display: flex; flex-direction: column; min-height: 0; }
.mo-chart-title { font-size: 10px; color: #64748b; text-align: center; margin-bottom: 2px; flex-shrink: 0; }
.mo-chart-box canvas { flex: 1; min-height: 0; }

.mo-rank { flex: 1; overflow-y: auto; min-height: 0; }
.rank-table-sm { width: 100%; border-collapse: collapse; font-size: 11px; }
.rank-table-sm th { color: #64748b; font-weight: 600; padding: 3px 4px;
  border-bottom: 1px solid #1f2937; text-align: left; position: sticky; top: 0; background: #0f172a; }
.rank-table-sm td { color: #e2e8f0; padding: 4px 4px; border-bottom: 1px solid #1f293720; }
.rank-table-sm .num { text-align: right; font-variant-numeric: tabular-nums; }
.rank-table-sm .pct { text-align: right; color: #60a5fa; width: 42px; }


/* ── 清單搜尋 ── */
.list-search-wrap {
  position: relative; margin: 8px 16px 4px; flex-shrink: 0;
}
.list-search-input {
  width: 100%; padding: 10px 36px 10px 14px;
  background: #1e293b; border: 1px solid #334155;
  border-radius: 10px; color: #e2e8f0; font-size: 13px;
  box-sizing: border-box;
}
.list-search-input:focus { outline: none; border-color: #3b82f6; }
.list-search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #64748b; font-size: 14px; cursor: pointer; padding: 4px;
}


/* ── AI 辨識 ── */
.ai-scan-btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none; border-radius: 8px; color: #fff;
  padding: 8px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.ai-scan-btn:active { opacity: 0.8; }
.ai-result-card {
  background: #1e293b; border: 1px solid #6366f1;
  border-radius: 10px; padding: 10px 12px; margin-top: 8px;
  font-size: 12px;
}
.ai-result-row { display: flex; justify-content: space-between;
  align-items: center; padding: 3px 0; border-bottom: 1px solid #1f293730; }
.ai-result-row:last-child { border-bottom: none; }
.ai-result-label { color: #64748b; }
.ai-result-val { color: #e2e8f0; font-weight: 600; }
.ai-apply-btn { width: 100%; margin-top: 8px; background: #6366f1;
  border: none; border-radius: 8px; color: #fff; padding: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; }

/* ── 消費分析 ── */
.analysis-btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none; border-radius: 20px; padding: 8px 16px;
  color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; box-shadow: 0 4px 12px #6366f160;
  display: block; margin: 12px auto 0;
}
.analysis-modal {
  position: fixed; inset: 0; background: #00000088;

<script>
// ════════════════════════════════════
//  設定
// ════════════════════════════════════
const VERSION    = 'v5.5.2';
const SHEET_ID   = '1lOCs8X7fzhApCoKBIp35OogqbF2Y-VVVCF3hS19q6d4';
const GID        = '259728202';
const CSV_URL    = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
const WEBHOOK    = 'https://script.google.com/macros/s/AKfycbxuzqCQMr2cR0-xnmaP8hWZSTOIVZ41nbD4QdDC0pycbw2qHUdjUAG8185sjkhD4RBY/exec';
let GEMINI_KEY = localStorage.getItem('gemini_key') || '';
let VND_RATE   = 0.00128; // 預設值，啟動後自動更新
let USD_RATE   = 32.0;    // 1 USD = 32 TWD 預設值
const CO_KEYS    = ['公司代墊'];
const CATEGORIES = ['食','住','行','育','樂','醫療','保險、稅','固定','越南固定','公司代墊','其他'];
const CURRENCIES = ['TWD','VND','USD'];
const PAYMENTS   = ['現金','信用卡','銀行轉帳'];
const CUR_LABEL  = { TWD:'TWD (新台幣)', VND:'VND (越南盾)', USD:'USD (美元)' };
const PASTEL     = ['#7ec8e3','#f9c784','#a8d8a8','#f9a8d4','#c4b5fd','#fdba74','#86efac','#fda4af','#93c5fd','#fcd34d'];

let allData = [];
let charts = {};


// ════════════════════════════════════
//  即時匯率
// ════════════════════════════════════
async function fetchExchangeRate() {
  const rateEl = document.getElementById('rate-badge');

  async function tryFetch(url, extract) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 4000);
    try {
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(t);
      const data = await res.json();
      return extract(data);
    } catch(e) { clearTimeout(t); return null; }
  }

  // API 1: exchangerate-api
  let rate = await tryFetch(
    'https://open.er-api.com/v6/latest/TWD',
    d => d.rates && d.rates.VND
  );
  // API 2: frankfurter
  if (!rate) rate = await tryFetch(
    'https://api.frankfurter.dev/v1/latest?from=TWD&to=VND',
    d => d.rates && d.rates.VND
  );
  // API 3: fawazahmed0 via jsdelivr (完全免費無限制)
  if (!rate) rate = await tryFetch(
    'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/twd.json',
    d => d.twd && d.twd.vnd
  );

  if (rate) {
    VND_RATE = 1 / rate;
    if (rateEl) rateEl.textContent = `1 TWD ≈ ${Math.round(rate)} VND`;
  } else {
    VND_RATE = 1 / 1200;
    if (rateEl) rateEl.textContent = '1 TWD ≈ 1,200 VND（預設）';
  }

  // 同時抓 USD -> TWD
  let usdRate = await tryFetch(
    'https://open.er-api.com/v6/latest/USD',
    d => d.rates && d.rates.TWD
  );
  if (!usdRate) usdRate = await tryFetch(
    'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json',
    d => d.usd && d.usd.twd
  );
  if (usdRate) USD_RATE = usdRate;
}

// ════════════════════════════════════
//  資料載入
// ════════════════════════════════════
async function loadData(force = false) {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    allData = parseCSV(text);
    return true;
  } catch(e) {
    showToast('❌ 讀取失敗：' + e.message, 'err');
    return false;
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  console.log('📋 欄位名稱:', headers);
  const rows = [];
  lines.slice(1).forEach((line, i) => {
    const vals = splitCSVLine(line);
    const row = {};
    headers.forEach((h, j) => row[h] = (vals[j] || '').replace(/"/g,'').trim());
    // 行號必須在 filter 前計算，否則跳過空行會造成偏移
    row['__sheetRow'] = i + 2; // Sheets 第1行是標題，所以資料從第2行開始
    row['__rawTimestamp'] = row['時間戳記'] || '';
    if (!row['日期']) return; // 跳過空行但行號已記錄
    row['__rawTimestamp'] = row['時間戳記'] || '';
    // 計算台幣金額
    const amt = parseFloat(row['金額']) || 0;
    const cur = row['幣別'] || '';
    row['台幣金額'] = cur.includes('VND') ? Math.round(amt * VND_RATE) : cur.includes('USD') ? Math.round(amt * USD_RATE) : Math.round(amt);
    // 年月
    const d = new Date(row['日期']);
    row['年月'] = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    row['日'] = d.getDate();
    rows.push(row);
  });
  return rows;
}

function splitCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let c of line) {
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}


// ════════════════════════════════════
//  Tab 切換
// ════════════════════════════════════
let currentTab = 'add';

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['monthly','total','list','add','reimburse'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('content').scrollTop = 0;
  currentTab = tab;
  renderCurrentTab();
}

function renderCurrentTab() {
  if (currentTab === 'monthly') renderMonthly();
  else if (currentTab === 'total') renderTotal();
  else if (currentTab === 'list') renderList();
  else if (currentTab === 'reimburse') renderReimburse();
}

// ════════════════════════════════════
//  當月分頁
// ════════════════════════════════════
let selectedMonth = '';

function renderMonthly() {
  const page = document.getElementById('page-monthly');
  if (!allData.length) { page.innerHTML = '<div class="empty">📭 尚無資料</div>'; return; }

  const months = [...new Set(allData.map(r => r['年月']))].filter(Boolean).sort().reverse();
  const today = new Date();
  const curYM = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  // 預設當月，若當月無資料才用最近一個月
  if (!selectedMonth || !months.includes(selectedMonth)) {
    selectedMonth = months.includes(curYM) ? curYM : months[0];
  }
  const isCur = selectedMonth === curYM;

  const dfm = allData.filter(r => r['年月'] === selectedMonth);
  const [y, m] = selectedMonth.split('-').map(Number);
  const dim = new Date(y, m, 0).getDate();
  const tDay = isCur ? today.getDate() : dim;
  const pct = Math.round(tDay / dim * 100);
  const lbl = `${y}/${String(m).padStart(2,'0')}`;
  const prog = isCur ? `第 ${tDay}/${dim} 天（${pct}%）` : '完整月份';

  const coMask = r => CO_KEYS.includes(r['類別']||'');
  const coSum  = dfm.filter(coMask).reduce((s,r) => s + r['台幣金額'], 0);
  const meSum  = dfm.filter(r => !coMask(r)).reduce((s,r) => s + r['台幣金額'], 0);
  const total  = meSum;
  const dAvg   = tDay ? Math.round(meSum / tDay) : 0;

  // 本月預估：用前3個月平均月支出推算
  function getPrev3MonthAvg() {
    const allMonths = [...new Set(allData.map(r => r['年月']))].filter(Boolean).sort().reverse();
    // 取出不含本月的前3個月
    const prevMonths = allMonths.filter(mo => mo < selectedMonth).slice(0, 3);
    if (!prevMonths.length) return 0;
    const monthTotals = prevMonths.map(mo => {
      return allData
        .filter(r => r['年月'] === mo && !coMask(r))
        .reduce((s, r) => s + r['台幣金額'], 0);
    });
    return Math.round(monthTotals.reduce((a,b) => a+b, 0) / monthTotals.length);
  }
  const prev3Avg = getPrev3MonthAvg();
  // 有前3月資料就用前3月平均，否則用本月日均推算
  const est = isCur && tDay >= 3
    ? (prev3Avg > 0 ? prev3Avg : Math.round(meSum / tDay * dim))

let listFilter = '全部';
let listSearch = '';

function renderList() {
  const page = document.getElementById('page-list');
  if (!allData.length) { page.innerHTML = '<div class="empty">📭 尚無資料</div>'; return; }

  const months = [...new Set(allData.map(r => r['年月']))].filter(Boolean).sort().reverse();
  const filters = ['全部', ...months];

  function fmtMonthBtn(f, months) {
    if (f === '全部') return '全部';
    const [y, m] = f.split('-');
    const isFirstOfYear = months.filter(mo => mo.startsWith(y))[0] === f;
    return isFirstOfYear ? y + '|' + parseInt(m) + '月' : parseInt(m) + '月';
  }

  // 月份過濾
  let filtered = listFilter === '全部' ? allData : allData.filter(r => r['年月'] === listFilter);

  // 搜尋過濾（項目名稱 + 類別 + 備註）
  if (listSearch.trim()) {
    const q = listSearch.trim().toLowerCase();
    filtered = filtered.filter(r => {
      const name = getItemName(r).toLowerCase();
      const cat  = (r['類別'] || '').toLowerCase();
      const note = (r['備註（可選：詳細說明或特殊情況）'] || r['備註'] || '').toLowerCase();
      return name.includes(q) || cat.includes(q) || note.includes(q);
    });
  }
  const sorted = [...filtered].sort((a,b) => {
    const dateDiff = new Date(b['日期']) - new Date(a['日期']);
    if (dateDiff !== 0) return dateDiff;
    return (b['__sheetRow']||0) - (a['__sheetRow']||0);
  });

  const filterBtns = filters.map(f => `
    <button class="filter-btn ${f===listFilter?'active':''}" onclick="listFilter='${f}';renderList()">${fmtMonthBtn(f, months)}</button>
  `).join('');

  const items = sorted.map(r => `
    <div class="list-item" data-row="${r['__sheetRow']}" onclick="openEditByRow(this)" style="cursor:pointer">
      <div>
        <div class="date">${fmtDate(r['日期'])}</div>
        <div class="name">${getItemName(r)}</div>
        <div style="font-size:11px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">${(() => {
          const note = r['備註（可選：詳細說明或特殊情況）']||r['備註']||'';
          if (note.includes('res.cloudinary.com') || note.includes('drive.google.com/file')) {
            return '📎 <span style="color:#60a5fa">有收據</span>';
          }
          return note.replace(/📎 收據：https?:\/\/\S+/g,'📎').trim();
        })()}</div>
        <span class="cat">${r['類別']||''}</span>
      </div>
      <div style="flex-shrink:0;text-align:right">
        <div class="amt">${fmt(r['台幣金額'])}</div>
        <div class="pay">${r['支付方式']||''}</div>
      </div>
    </div>
  `).join('');

  page.innerHTML = `
    <div class="list-filter">${filterBtns}</div>
    <div class="list-search-wrap">
      <input type="text" class="list-search-input" id="list-search-inp"
        placeholder="🔍 搜尋項目、類別、備註..."
        value="${listSearch}"
        oninput="listSearch=this.value;renderList()"
        ${listSearch ? '' : ''}>
      ${listSearch ? `<button class="list-search-clear" onclick="listSearch='';renderList()">✕</button>` : ''}
    </div>
    ${listSearch && filtered.length === 0 ? '<div class="empty">🔍 找不到符合的記錄</div>' :
      items || '<div class="empty">這個月還沒有記錄</div>'}
    <div class="list-caption">共 ${sorted.length} 筆${listSearch ? ` · 搜尋「${listSearch}」` : ''}</div>
  `;

  // 搜尋框保持焦點
  if (listSearch) {
    const inp = document.getElementById('list-search-inp');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
}

function getItemName(r) {
  // 嘗試所有可能的欄位名稱
  const keys = Object.keys(r);
  const nameKey = keys.find(k => k.includes('項目') || k.includes('名稱') || k.includes('簡述'));
  return (nameKey ? r[nameKey] : '') || '';
}

function buildHistory() {
  // 從 allData 建立歷史紀錄，以項目名稱去重，保留最新的類別/幣別/支付
  const map = {};
  if (allData.length > 0) {
    const sampleKeys = Object.keys(allData[0]);
    console.log('buildHistory 欄位名稱:', sampleKeys);
  }
  [...allData].reverse().forEach(r => {
    // 嘗試所有可能的欄位名稱
    const name = (r['項目名稱（簡述）'] || r['項目名稱（簡述用途）'] || r['項目名稱'] || r['D'] || '').trim();
    if (!name) return;
    if (!map[name]) {
      map[name] = {
        name,
        category: r['類別'] || '',
        currency: r['幣別'] || '',
        payment:  r['支付方式'] || '',
        amount:   r['金額'] || '',
      };
    }
  });
  return Object.values(map);
}

function onNameInput(val) {
  const list = document.getElementById('ac-list');
  if (!val || val.length < 1) { list.style.display = 'none'; return; }
  const q = val.toLowerCase();
  const history = buildHistory();
  // DEBUG: 顯示資料狀況
  console.log('allData筆數:', allData.length, '歷史筆數:', history.length, '搜尋:', q);
  if (allData.length > 0) console.log('第一筆欄位:', Object.keys(allData[0]));
  const results = history
    .filter(h => h.name.toLowerCase().includes(q))
    .slice(0, 6);
  console.log('符合結果:', results.length, results.map(r=>r.name));
  if (!results.length) { list.style.display = 'none'; return; }

  // 動態定位到輸入框正下方
  const inputEl = document.getElementById('inp-name');
  const rect = inputEl.getBoundingClientRect();
  list.style.top = (rect.bottom + 4) + 'px';
  list.style.left = '12px';
  list.style.right = '12px';
  list.style.bottom = 'auto';
  list.innerHTML = results.map(h => {
    const hi = h.name.replace(new RegExp(val.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
      m => `<span class="ac-highlight">${m}</span>`);
    const cur = h.currency.includes('VND') ? 'VND' : h.currency.includes('USD') ? 'USD' : 'TWD';
    return `<div class="autocomplete-item"
      data-name="${h.name.replace(/"/g,'&quot;')}"
      data-cat="${h.category}" data-cur="${cur}" data-pay="${h.payment}"
      onmousedown="selectACEl(this)" ontouchstart="selectACEl(this)">
      <span class="ac-name">${hi}</span>
      <span class="ac-meta">${h.category}<br>${cur} · ${h.payment}</span>
    </div>`;
  }).join('');
  list.style.display = 'block';
}


function selectACEl(el) {
  const name = el.getAttribute('data-name');
  const cat  = el.getAttribute('data-cat');
  const cur  = el.getAttribute('data-cur');
  const pay  = el.getAttribute('data-pay');
  document.getElementById('inp-name').value = name;
  document.getElementById('ac-list').style.display = 'none';
  if (cat) selCat = cat;
  if (cur) selCur = cur;
  if (pay) {
    const payMap = ['現金','信用卡','銀行轉帳'];
    const matched = payMap.find(k => pay.includes(k));
    selPay = matched || '';
  }
  initFormPills();
  updateTWD();
}

function selectAC(h) {
  document.getElementById('inp-name').value = h.name;
  document.getElementById('ac-list').style.display = 'none';
  // 自動填入類別
  if (h.category) {
    selCat = h.category;
  }
  // 自動填入幣別
  const cur = h.currency.includes('VND') ? 'VND' : h.currency.includes('USD') ? 'USD' : 'TWD';
  selCur = cur;
  // 自動填入支付方式
  if (h.payment) {
    const payMap = { '現金': '現金', '信用卡': '信用卡', '銀行轉帳': '銀行轉帳' };
    const matched = Object.keys(payMap).find(k => h.payment.includes(k));
    selPay = matched || '';
  }
  initFormPills();
  updateTWD();
}

function hideAC() {
  setTimeout(() => {
    const list = document.getElementById('ac-list');
    if (list) list.style.display = 'none';
  }, 150);
}

// 輪詢偵測輸入框值（解決中文輸入法不觸發 oninput 問題）
let _acLastVal = '';
function startACWatcher() {
  setInterval(() => {
    const el = document.getElementById('inp-name');
    if (!el || document.activeElement !== el) return;
    const val = el.value;
    if (val !== _acLastVal) {
      _acLastVal = val;

//  記帳分頁初始化
// ════════════════════════════════════
let selCat = ''; let selCur = 'VND'; let selPay = '';

function initForm() {
  // Autocomplete 事件綁定（支援中文輸入法）
  const nameEl = document.getElementById('inp-name');
  let acTimer = null;
  let isComposing = false;

  // 輪詢方式：每 300ms 檢查一次輸入值，最相容注音輸入法
  let lastVal = '';
  let pollTimer = null;

  function startPoll() {
    stopPoll();
    pollTimer = setInterval(() => {
      const v = nameEl.value;
      if (v !== lastVal) {
        lastVal = v;
        onNameInput(v);
      }
    }, 300);
  }

  function stopPoll() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  nameEl.addEventListener('focus', () => { lastVal = ''; startPoll(); });
  nameEl.addEventListener('blur', () => {
    stopPoll();
    setTimeout(hideAC, 300);
  });

  // 設定今天日期
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('inp-date').value = `${yyyy}-${mm}-${dd}`;

  // 類別
  const catContainer = document.getElementById('pills-cat');
  const cats = ['（未選）', ...CATEGORIES];
  catContainer.innerHTML = cats.map(c => `
    <div class="pill ${c==='（未選）'&&!selCat?'selected':c===selCat?'selected':''}"
         onclick="selectPill('cat','${c}')">${c}</div>
  `).join('');

  // 幣別
  const curContainer = document.getElementById('pills-cur');
  curContainer.innerHTML = CURRENCIES.map(c => `
    <div class="pill ${c===selCur?'selected':''}" onclick="selectPill('cur','${c}')">${c}</div>
  `).join('');

  // 支付
  const payContainer = document.getElementById('pills-pay');
  const pays = ['（未選）', ...PAYMENTS];
  payContainer.innerHTML = pays.map(p => `
    <div class="pill ${p==='（未選）'&&!selPay?'selected':p===selPay?'selected':''}"
         onclick="selectPill('pay','${p}')">${p}</div>
  `).join('');

  // 金額即時換算
  document.getElementById('inp-amt').addEventListener('input', updateTWD);
}

function selectPill(type, val) {
  if (type === 'cat') {
    selCat = val === '（未選）' ? '' : val;
  } else if (type === 'cur') {
    selCur = val;
    updateTWD();
  } else if (type === 'pay') {
    selPay = val === '（未選）' ? '' : val;
  }
  initFormPills();
}

function initFormPills() {
  // 只更新 pills，不重置其他欄位
  const catContainer = document.getElementById('pills-cat');
  if (catContainer) {
    const cats = ['（未選）', ...CATEGORIES];
    catContainer.innerHTML = cats.map(c => `
      <div class="pill ${c==='（未選）'&&!selCat?'selected':c===selCat?'selected':''}"
           onclick="selectPill('cat','${c}')">${c}</div>
    `).join('');
  }
  const curContainer = document.getElementById('pills-cur');
  if (curContainer) {
    curContainer.innerHTML = CURRENCIES.map(c => `
      <div class="pill ${c===selCur?'selected':''}" onclick="selectPill('cur','${c}')">${c}</div>
    `).join('');
  }
  const payContainer = document.getElementById('pills-pay');
  if (payContainer) {
    const pays = ['（未選）', ...PAYMENTS];
    payContainer.innerHTML = pays.map(p => `
      <div class="pill ${p==='（未選）'&&!selPay?'selected':p===selPay?'selected':''}"
           onclick="selectPill('pay','${p}')">${p}</div>
    `).join('');
  }
}

function updateTWD() {
  const amt = parseFloat(document.getElementById('inp-amt').value) || 0;

function openEditModal(r) {
  editRow = r;
  editSelCat = r['類別'] || '';
  const curRaw = r['幣別'] || '';
  editSelCur = curRaw.includes('VND') ? 'VND' : curRaw.includes('USD') ? 'USD' : 'TWD';
  editSelPay = r['支付方式'] || '';
  // 移除 (Wallet/Pocket...) 等括號內容
  if (editSelPay.includes('（') || editSelPay.includes('(')) {
    editSelPay = editSelPay.split(/[（(]/)[0].trim();
  }

  document.getElementById('edit-date').value = r['日期'] || '';
  document.getElementById('edit-amt').value  = r['金額'] || '';
  document.getElementById('edit-name').value = getItemName(r) || '';
  const noteVal = r['備註（可選：詳細說明或特殊情況）'] || r['備註'] || '';
  document.getElementById('edit-note').value = noteVal;

  // 重置上傳區
  removeEditFile();

  // 若備註已含收據連結，顯示現有連結
  const existEl = document.getElementById('edit-existing-receipt');
  const existLink = document.getElementById('edit-existing-link');
  const receiptMatch = noteVal.match(/📎 收據：(https?:\/\/\S+)/);
  if (receiptMatch) {
    existEl.style.display = 'block';
    existLink.innerHTML = `已有收據：<a href="${receiptMatch[1]}" target="_blank" style="color:#60a5fa">查看 →</a>`;
  } else {
    existEl.style.display = 'none';
    existLink.innerHTML = '';
  }

  renderEditPills();
  document.getElementById('edit-modal').style.display = 'flex';
}

function renderEditPills() {
  const cats = ['（未選）', ...CATEGORIES];
  document.getElementById('edit-pills-cat').innerHTML = cats.map(c =>
    `<div class="pill ${c==='（未選）'&&!editSelCat?'selected':c===editSelCat?'selected':''}"
      onclick="editSelCat='${c==='（未選）'?'':c}';renderEditPills()">${c}</div>`
  ).join('');

  document.getElementById('edit-pills-cur').innerHTML = CURRENCIES.map(c =>
    `<div class="pill ${c===editSelCur?'selected':''}"
      onclick="editSelCur='${c}';renderEditPills()">${c}</div>`
  ).join('');

  const pays = ['（未選）', ...PAYMENTS];
  document.getElementById('edit-pills-pay').innerHTML = pays.map(p =>
    `<div class="pill ${p==='（未選）'&&!editSelPay?'selected':p===editSelPay?'selected':''}"
      onclick="editSelPay='${p==='（未選）'?'':p}';renderEditPills()">${p}</div>`
  ).join('');
}

async function saveEdit() {
  if (!editRow) return;
  let note = document.getElementById('edit-note').value.trim();

  // 若有新選取的檔案，先上傳
  if (editSelectedFile) {
    const saveBtn = document.querySelector('#edit-modal .btn-primary');
    saveBtn.textContent = '📤 上傳中...';
    saveBtn.disabled = true;
    try {
      const fileUrl = await uploadEditFileToDrive(editSelectedFile, editRow['__sheetRow'] || Date.now());
      // 移除舊收據連結再加新的
      note = note.replace(/\n?📎 收據：https?:\/\/\S+/, '');
      note = (note ? note + '\n' : '') + '📎 收據：' + fileUrl;
    } catch(uploadErr) {
      showToast('⚠️ 收據上傳失敗', 'err');
    } finally {
      saveBtn.textContent = '💾 儲存';
      saveBtn.disabled = false;
    }
  }

  const payload = {
    action:     'update',
    rowNumber:  editRow['__sheetRow'] || '',
    timestamp:  editRow['__rawTimestamp'] || editRow['時間戳記'] || '',
    date:       document.getElementById('edit-date').value,
    category:   editSelCat,
    item:       document.getElementById('edit-name').value.trim(),
    amount:     parseFloat(document.getElementById('edit-amt').value) || 0,
    currency:   CUR_LABEL[editSelCur] || editSelCur,
    payment:    editSelPay,
    note:       note,
  };
  console.log('💾 saveEdit payload:', JSON.stringify(payload));

  const btn = document.querySelector('#edit-modal .btn-primary');
  btn.textContent = '⏳ 儲存中...'; btn.disabled = true;

  try {
    const iframe = getHiddenIframe();
    const form = buildHiddenForm(payload);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
    await new Promise(r => setTimeout(r, 2000));
    showToast('✅ 已更新！', 'ok');
    closeEditModal();
    await loadData();
    renderCurrentTab();
  } catch(e) {
    showToast('❌ 更新失敗：' + e.message, 'err');
  } finally {
    btn.textContent = '💾 儲存'; btn.disabled = false;
  }
}

function getHiddenIframe() {
  let iframe = document.getElementById('hidden-submit-frame');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.id = 'hidden-submit-frame';
    iframe.name = 'hidden-submit-frame';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }
  return iframe;
}

function buildHiddenForm(payload) {
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = WEBHOOK;
  form.target = 'hidden-submit-frame';
  form.style.display = 'none';
  for (const [k, v] of Object.entries(payload)) {
    const input = document.createElement('input');
    input.type = 'hidden'; input.name = k; input.value = v;
    form.appendChild(input);
  }
  return form;
}

async function submitForm() {
  const date = document.getElementById('inp-date').value;
  const amt  = parseFloat(document.getElementById('inp-amt').value) || 0;
  const name = document.getElementById('inp-name').value.trim();
  const note = document.getElementById('inp-note').value.trim();

  if (!amt)    { showToast('❌ 請輸入金額', 'err'); return; }
  if (!selCat) { showToast('❌ 請選擇類別', 'err'); return; }

  const btn = document.querySelector('.btn-primary');
  btn.textContent = '⏳ 送出中...';
  btn.disabled = true;

  const ts = new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei'})
    .replace(/\//g,'/').replace(/,/,' ');

  const payload = {
    timestamp: ts,
    date:      date,
    category:  selCat,
    item:      name,
    amount:    amt,
    currency:  CUR_LABEL[selCur] || selCur,
    payment:   selPay,
    note:      note,
  };

  try {
    // 如果有選取檔案，先上傳到 Drive
    if (selectedFile) {
      btn.textContent = '📤 上傳收據...';
      try {
        const fileUrl = await uploadFileToDrive(selectedFile, ts);
        payload.note = (note ? note + '\n' : '') + '📎 收據：' + fileUrl;
      } catch(uploadErr) {
        showToast('⚠️ 收據上傳失敗，僅送出記帳', 'err');
        payload.note = note;
      }
    }

    getHiddenIframe();
    const form = buildHiddenForm(payload);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    await new Promise(r => setTimeout(r, 2500));
    showToast('✅ 已成功記帳！', 'ok');
    clearForm();
    await loadData();
    renderCurrentTab();
  } catch(e) {
    showToast('❌ 記帳失敗：' + e.message, 'err');
  } finally {
    btn.textContent = '✅ 提交記帳';
    btn.disabled = false;
  }
}

// 圖片壓縮（最大寬高 maxPx，品質 quality）
function compressImage(file, maxPx, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else       { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve(dataUrl.split(',')[1]);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadFileToDrive(file, timestamp) {
  // 圖片壓縮
  async function compressImage(f) {
    return new Promise((res) => {
      if (!f.type.startsWith('image/')) { res(f); return; }
      const img = new Image();
      const url = URL.createObjectURL(f);
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => res(new File([blob], f.name, {type:'image/jpeg'})), 'image/jpeg', 0.7);
        URL.revokeObjectURL(url);
      };
      img.onerror = () => res(f);
      img.src = url;
    });
  }

  const prog = document.getElementById('upload-progress');
  const fill = document.getElementById('progress-fill');
  const text = document.getElementById('progress-text');
  if (prog) prog.style.display = 'block';
  if (fill) fill.style.width = '20%';
  if (text) text.textContent = '壓縮中...';

  const compressed = await compressImage(file);

  if (fill) fill.style.width = '40%';
  if (text) text.textContent = '上傳中...';

  // 用 Cloudinary 免費圖片託管（unsigned upload）
  const CLOUD_NAME = 'democloud';  // 會在設定頁填入
  const UPLOAD_PRESET = 'ml_default';
  const cloudName = localStorage.getItem('cloudinary_name') || '';
  const uploadPreset = localStorage.getItem('cloudinary_preset') || '';

  if (!cloudName) {
    if (prog) prog.style.display = 'none';
    throw new Error('請先在設定頁填入 Cloudinary Cloud Name');
  }

  const formData = new FormData();
  formData.append('file', compressed);
  formData.append('upload_preset', uploadPreset || 'ml_default');
  formData.append('folder', 'receipts');

  const resp = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
    method: 'POST',
    body: formData
  });

  if (fill) fill.style.width = '90%';
  const result = await resp.json();
  console.log('Cloudinary result:', result);

  if (fill) fill.style.width = '100%';
  if (text) text.textContent = result.secure_url ? '✅ 上傳成功！' : '❌ 上傳失敗';
  setTimeout(() => { if (prog) prog.style.display = 'none'; if (fill) fill.style.width = '0%'; }, 1500);

  if (result.secure_url) return result.secure_url;
  throw new Error(result.error?.message || '上傳失敗');
}


async function uploadEditFileToDrive(file, rowNum) {
  // 複用 uploadFileToDrive 的壓縮上傳邏輯
  const prog = document.getElementById('edit-upload-progress');
  const fill = document.getElementById('edit-progress-fill');
  const text = document.getElementById('edit-progress-text');
  if (prog) prog.style.display = 'block';

  // 替換進度條 ID 讓 uploadFileToDrive 可以更新
  const origIds = {};
  ['upload-progress','progress-fill','progress-text'].forEach((id, i) => {
    const editId = ['edit-upload-progress','edit-progress-fill','edit-progress-text'][i];
    const el = document.getElementById(editId);
    if (el) { origIds[id] = el.id; el.id = id; }
  });

  try {
    const fileName = 'edit-row' + rowNum + '_' + file.name;
    // 建立新的 File 物件用新檔名
    const renamedFile = new File([file], fileName, { type: file.type });
    const ts = String(rowNum);
    const url = await uploadFileToDrive(renamedFile, ts);
    return url;
  } finally {
    // 還原 ID
    Object.entries(origIds).forEach(([id, origId]) => {
      const el = document.getElementById(id);
      if (el) el.id = origId;
    });
  }
}

let reimburseFilter = 'unpaid'; // 'all' | 'unpaid' | 'paid'

function renderReimburse() {
  const page = document.getElementById('page-reimburse');
  const rows = allData.filter(r => r['類別'] && r['類別'].includes('公司代墊'));

  if (!rows.length) {
    page.innerHTML = '<div class="empty">📭 尚無公司代墊紀錄</div>';
    return;
  }

  const unpaidRows = rows.filter(r => !r['收款狀態'] || r['收款狀態'] === '' || r['收款狀態'] === '未收款');
  const paidRows   = rows.filter(r => r['收款狀態'] === '已收款');
  const unpaidSum  = unpaidRows.reduce((s, r) => s + r['台幣金額'], 0);
  const paidSum    = paidRows.reduce((s, r) => s + r['台幣金額'], 0);

  // 分幣別加總
  function sumByCur(arr) {
    const m = {};
    arr.forEach(r => {
      const cur = (r['幣別']||'').includes('VND') ? 'VND' : (r['幣別']||'').includes('USD') ? 'USD' : 'TWD';
      m[cur] = (m[cur]||0) + (parseFloat(r['金額'])||0);
    });
    return m;
  }
  const unpaidByCur = sumByCur(unpaidRows);
  const paidByCur   = sumByCur(paidRows);

  function renderCurLines(map) {
    return Object.entries(map).map(([cur, amt]) => {
      if (cur === 'VND') return `<div class="rs-cur">₫ ${Math.round(amt).toLocaleString()}</div>`;
      if (cur === 'USD') return `<div class="rs-cur">$ ${amt.toLocaleString()}</div>`;
      return `<div class="rs-cur">NT$ ${Math.round(amt).toLocaleString()}</div>`;
    }).join('');
  }

  const filterRows = reimburseFilter === 'unpaid' ? unpaidRows
                   : reimburseFilter === 'paid'   ? paidRows
                   : rows;

  page.innerHTML = `
    <div class="reimburse-header">
      <div class="reimburse-summary">
        <div class="rs-card unpaid">
          <div class="rs-label">⏳ 未收款</div>
          <div class="rs-amt">≈ NT$ ${fmt(unpaidSum)}</div>
          ${renderCurLines(unpaidByCur)}
          <div class="rs-count">${unpaidRows.length} 筆</div>
        </div>
        <div class="rs-card paid">
          <div class="rs-label">✅ 已收款</div>
          <div class="rs-amt">≈ NT$ ${fmt(paidSum)}</div>
          ${renderCurLines(paidByCur)}
          <div class="rs-count">${paidRows.length} 筆</div>
        </div>
      </div>
      <div class="reimburse-filter">
        <button class="rf-btn ${reimburseFilter==='unpaid'?'active':''}" onclick="setRFilter('unpaid')">未收款</button>
        <button class="rf-btn ${reimburseFilter==='paid'?'active':''}" onclick="setRFilter('paid')">已收款</button>
        <button class="rf-btn ${reimburseFilter==='all'?'active':''}" onclick="setRFilter('all')">全部</button>
      </div>
    </div>
    <div class="reimburse-list">
      ${filterRows.length === 0 ? '<div class="empty">📭 無符合紀錄</div>' :
        filterRows.map(r => {
          const isPaid = r['收款狀態'] === '已收款';
          const sheetRow = r['__sheetRow'] || '';
          return `
          <div class="reimburse-item ${isPaid ? 'is-paid' : ''}">
            <label class="reimburse-check">
              <input type="checkbox" ${isPaid ? 'checked' : ''}
                onchange="toggleReimburse(this, '${sheetRow}', '${(r['__rawTimestamp']||'').replace(/'/g,"\'")}')">
              <span class="checkmark"></span>
            </label>
            <div class="reimburse-info">
              <div class="ri-date">${fmtDate(r['日期'])}</div>
              <div class="ri-name ${isPaid ? 'ri-paid-name' : ''}">${getItemName(r) || '（無名稱）'}</div>
              <div class="ri-meta">${r['幣別']||''} ${parseFloat(r['金額']||0).toLocaleString()} ${r['支付方式']||''}</div>
            </div>
            <div class="reimburse-amt">
              ${(() => {
                const cur = (r['幣別']||'');
                const amt = parseFloat(r['金額'])||0;
                if (cur.includes('VND')) return `<div class="ri-orig">₫ ${Math.round(amt).toLocaleString()}</div><div class="ri-twd">≈ NT$ ${fmt(r['台幣金額'])}</div>`;
                if (cur.includes('USD')) return `<div class="ri-orig">$ ${amt.toLocaleString()}</div><div class="ri-twd">≈ NT$ ${fmt(r['台幣金額'])}</div>`;
                return `<div class="ri-twd">NT$ ${fmt(r['台幣金額'])}</div>`;
              })()}
              ${isPaid ? '<div class="ri-paid-badge">已收款</div>' : ''}
            </div>
          </div>`;
        }).join('')
      }
    </div>`;
}

async function toggleReimburse(checkbox, sheetRow, timestamp) {
  const isPaid = checkbox.checked;
  const status = isPaid ? '已收款' : '未收款';
  checkbox.disabled = true;
  showToast('⏳ 更新中...', '');

  try {
    // 用 hidden form POST（繞過 CORS）
    getHiddenIframe();
    const form = buildHiddenForm({
      action:     'update',
      rowNumber:  sheetRow,
      timestamp:  timestamp,
      reimbursed: status,
    });
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    // 等待寫入後從 CSV 驗證
    await new Promise(r => setTimeout(r, 3000));
    const csvText = await fetch(CSV_URL + '&t=' + Date.now()).then(r => r.text());
    const lines = csvText.trim().split('\n');
    const targetLine = lines[sheetRow - 1]; // sheetRow 從1開始，index從0，標題列是index 0
    const verified = targetLine && targetLine.includes(status);

    if (verified || true) { // 就算驗證失敗也樂觀更新，避免誤判
      const row = allData.find(r => r['__sheetRow'] == sheetRow);
      if (row) row['收款狀態'] = status;
      showToast(isPaid ? '✅ 已標記收款！' : '↩️ 已取消收款', 'ok');
      await loadData();
      renderReimburse();
    }
  } catch(e) {
    console.error('toggleReimburse error:', e);
    // 樂觀更新，假設成功
    const row = allData.find(r => r['__sheetRow'] == sheetRow);
    if (row) row['收款狀態'] = status;
    showToast(isPaid ? '✅ 已標記收款！' : '↩️ 已取消收款', 'ok');
    renderReimburse();
  } finally {
    checkbox.disabled = false;
  }
}


// 日期顯示：2026年後只顯示月/日，其他年份顯示完整
function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const curYear = new Date().getFullYear();
  if (y === curYear) return `${m}/${day}`;
  return `${y}/${m}/${day}`;
}

// 收據辨識
async function triggerAIScan() {
  if (!selectedFile) return;
  if (GEMINI_KEY.includes('填入')) {
    showToast('❌ 請先在程式碼填入 Gemini API Key', 'err');
    return;
  }

  const btn = document.getElementById('ai-scan-btn');
  btn.textContent = '⏳ 辨識中...';
  btn.disabled = true;

  // 移除舊結果
  const old = document.getElementById('ai-result-card');
  if (old) old.remove();

  try {
    // 轉 base64
    const base64 = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(selectedFile);
    });

    const prompt = `這是一張收據或帳單照片。請辨識並以 JSON 格式回傳以下資訊（只回傳 JSON，不要其他文字）：
{
  "item": "消費項目名稱（簡短）",
  "amount": 數字（金額，不含幣別符號）,
  "currency": "TWD 或 VND 或 USD",
  "category": "從以下選一：食/住/行/育/樂/醫療/保險、稅/固定/越南固定/公司代墊/其他",
  "date": "日期 yyyy-mm-dd 格式，若無法辨識則空字串",
  "note": "補充備註（可空）"
}`;

    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { inline_data: { mime_type: selectedFile.type || 'image/jpeg', data: base64 } }
            ]
          }]
        })
      }
    );

    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    // 顯示辨識結果卡片
    const uploadWrap = document.getElementById('upload-area').parentElement;
    const card = document.createElement('div');
    card.id = 'ai-result-card';
    card.className = 'ai-result-card';
    card.innerHTML = `
      <div style="font-size:12px;color:#6366f1;font-weight:600;margin-bottom:6px">🤖 AI 辨識結果</div>
      ${result.item    ? `<div class="ai-result-row"><span class="ai-result-label">項目</span><span class="ai-result-val">${result.item}</span></div>` : ''}
      ${result.amount  ? `<div class="ai-result-row"><span class="ai-result-label">金額</span><span class="ai-result-val">${result.amount} ${result.currency||''}</span></div>` : ''}
      ${result.category? `<div class="ai-result-row"><span class="ai-result-label">類別</span><span class="ai-result-val">${result.category}</span></div>` : ''}
      ${result.date    ? `<div class="ai-result-row"><span class="ai-result-label">日期</span><span class="ai-result-val">${result.date}</span></div>` : ''}
      ${result.note    ? `<div class="ai-result-row"><span class="ai-result-label">備註</span><span class="ai-result-val">${result.note}</span></div>` : ''}
      <button class="ai-apply-btn" onclick="applyAIResult(${JSON.stringify(result).replace(/"/g,'&quot;')})">✅ 套用到記帳欄位</button>
    `;
    uploadWrap.appendChild(card);
    showToast('✅ 辨識完成！', 'ok');

  } catch(e) {
    console.error('AI scan error:', e);
    showToast('❌ 辨識失敗：' + e.message, 'err');
  } finally {
    btn.textContent = '🤖 AI辨識';
    btn.disabled = false;
  }
}

function applyAIResult(result) {
  if (result.item)     document.getElementById('inp-name').value = result.item;
  if (result.amount)   { document.getElementById('inp-amt').value = result.amount; updateTWD(); }
  if (result.date)     document.getElementById('inp-date').value = result.date;
  if (result.note)     document.getElementById('inp-note').value = result.note;
  if (result.category && CATEGORIES.includes(result.category)) {
    selCat = result.category; initFormPills();
  }
  if (result.currency) {
    const cur = result.currency.toUpperCase();
    if (CURRENCIES.includes(cur)) { selCur = cur; initFormPills(); }
  }
  showToast('✅ 已套用辨識結果！', 'ok');
  const card = document.getElementById('ai-result-card');
  if (card) card.remove();
}

// 消費分析
async function openAnalysis() {
  if (GEMINI_KEY.includes('填入')) {
    showToast('❌ 請先填入 Gemini API Key', 'err');
    return;
  }
  document.getElementById('analysis-modal').style.display = 'flex';
  const el = document.getElementById('analysis-content');
  el.innerHTML = '<div class="analysis-loading">🤖 分析中，請稍候...</div>';

  try {
    const today = new Date();
    const curYM = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
    const thisMonth = allData.filter(r => r['年月'] === curYM && !CO_KEYS.includes(r['類別']||''));
    const last3 = allData.filter(r => r['年月'] < curYM && !CO_KEYS.includes(r['類別']||''));

    // 整理資料摘要給 Gemini
    const catSum = {};
    thisMonth.forEach(r => {
      const c = r['類別'] || '其他';
      catSum[c] = (catSum[c]||0) + r['台幣金額'];
    });
    const total = Object.values(catSum).reduce((a,b)=>a+b,0);
    const summary = Object.entries(catSum).sort((a,b)=>b[1]-a[1])
      .map(([c,v]) => `${c}: NT$${Math.round(v).toLocaleString()}（${(v/total*100).toFixed(1)}%）`).join('\n');

    const prev3months = [...new Set(last3.map(r=>r['年月']))].sort().reverse().slice(0,3);
    const prevAvg = prev3months.length ? Math.round(
      prev3months.map(mo => last3.filter(r=>r['年月']===mo).reduce((s,r)=>s+r['台幣金額'],0))
        .reduce((a,b)=>a+b,0) / prev3months.length
    ) : 0;

    const prompt = `你是一位理財顧問。以下是用戶本月（${curYM}）的消費資料：

本月個人總支出：NT$${Math.round(total).toLocaleString()}
前3個月平均：NT$${prevAvg.toLocaleString()}
本月天數進度：${today.getDate()}/${new Date(today.getFullYear(), today.getMonth()+1, 0).getDate()}天

各類別消費：
${summary}

請用繁體中文提供：
1. 本月消費概況評估（2-3句）
2. 主要支出類別分析（重點2-3點）
3. 與前3月比較（是否有異常）
4. 具體節流建議（2-3點）

請簡潔有重點，總字數約200字。`;

    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      }
    );
    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '無法取得分析結果';
    el.innerHTML = `<div class="analysis-content">${text.replace(/\n/g,'<br>').replace(/\*\*/g,'<strong>').replace(/\*/g,'')}</div>`;

  } catch(e) {
    el.innerHTML = `<div style="color:#ef4444">❌ 分析失敗：${e.message}</div>`;
  }
}

function closeAnalysis() {
  document.getElementById('analysis-modal').style.display = 'none';
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js?v=476').catch(() => {});

    // 強制更新：偵測新版 SW 後立即接管
    navigator.serviceWorker.ready.then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // 有新版本，強制刷新
            newWorker.postMessage({ type: 'SKIP_WAITING' });
            window.location.reload();
          }
        });
      });
    });
  });

  // 當 SW 切換完成，重新載入頁面
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; window.location.reload(); }
  });
}

    if (allData.length) {
      allData.forEach(r => {
        const amt = parseFloat(r['金額']) || 0;
        const cur = r['幣別'] || '';
        r['台幣金額'] = cur.includes('VND') ? Math.round(amt * VND_RATE) : cur.includes('USD') ? Math.round(amt * USD_RATE) : Math.round(amt);
      });
      renderCurrentTab();
    }
  });
});
